<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVH Scanner Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D0B2D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="app-container">
        <!-- Tabs Navigation -->
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('scan')">QUÉT MÃ</button>
            <button class="tab-btn" onclick="switchTab('history')">LỊCH SỬ</button>
        </nav>

        <!-- Main Content -->
        <main class="tab-content">
            <!-- Scan View -->
            <section id="scan-view" class="view active">
                <!-- Mode Selector -->
                <div class="mode-selector-container">
                    <div class="mode-switch">
                        <input type="radio" name="scanMode" id="modeSingle" value="single" checked>
                        <label for="modeSingle">Quét từng mã</label>
                        <input type="radio" name="scanMode" id="modeContinuous" value="continuous">
                        <label for="modeContinuous">Quét liên tục</label>
                    </div>
                </div>

                <!-- Main Scanner UI -->
                <div class="scanner-container" id="scanner-ui">
                    <div id="reader"></div>
                    <div class="scan-overlay" id="scan-overlay"></div>
                </div>

                <div class="controls-container">
                    <button id="start-btn" class="main-scan-btn glow" onclick="toggleScanner()">
                        <span id="btn-text">BẮT ĐẦU QUÉT</span>
                        <div class="btn-subtext" id="btn-subtext">Nhấn để khởi động Camera</div>
                    </button>
                </div>

                <!-- Last Scan Status -->
                <div class="last-scan-status" id="last-scan-info">
                    <div class="status-header">Mã vừa quét:</div>
                    <div class="status-content" id="scanned-result">Đang chờ...</div>
                    <div class="status-footer" id="sync-status">Sẵn sàng</div>
                </div>
            </section>

            <!-- History View -->
            <section id="history-view" class="view">
                <div class="history-header">
                    <h3>Lịch sử quét (Lưu tại máy)</h3>
                    <button class="icon-btn" onclick="clearLocalHistory()">
                        <span>Xóa hết</span>
                    </button>
                </div>
                <div id="history-list" class="history-list">
                    <p class="empty-msg">Chưa có dữ liệu</p>
                </div>
            </section>
        </main>

        <!-- Copyright -->
        <footer class="footer">
            <span class="copyright">Thực hiện bởi <i>NVH</i></span>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
